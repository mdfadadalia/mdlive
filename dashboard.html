<!DOCTYPE html>
<html>

<head>

    <title>Dashboard</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="sidebar">

        <h4 class="text-center mt-3">🏨 MD's Hotel</h4>

        <a href="dashboard.html">Dashboard</a>
        <a href="guests.html">Guest Management</a>
        <a href="user.html">User Management</a>
        <a href="#" onclick="logout()">Logout</a>

    </div>

    <div class="content">

        <div class="header">
            <button class="menu-btn" onclick="toggleMenu()">☰</button>
            <h4>Hotel Management System</h4>
            <span id="user"></span>
        </div>

        <div class="row mt-4 g-3">
            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card-box card-blue">
                    <h4 id="totalGuests">0</h4>
                    <p>Total Guests</p>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card-box card-green">
                    <h4 id="todayCheckin">0</h4>
                    <p>Today Check-In</p>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card-box card-orange">
                    <h4 id="todayCheckout">0</h4>
                    <p>Today Check-Out</p>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="card-box card-red">
                    <h4 id="users">0</h4>
                    <p>System Users</p>
                </div>
            </div>
        </div>

        <footer class="mt-5">
            Hotel Management System © 2026, By : Swan Solution Pvt. Ltd
        </footer>

    </div>

    <script>



        let guests = JSON.parse(localStorage.getItem("guests")) || [];

        totalGuests.innerText = guests.length;

        let today = new Date().toISOString().split("T")[0];

        todayCheckin.innerText = guests.filter(g => g.checkin == today).length;

        todayCheckout.innerText = guests.filter(g => g.checkout == today).length;

        users.innerText = (JSON.parse(localStorage.getItem("users")) || []).length;

        function logout() {
            localStorage.removeItem("loginUser");
            location.href = "login.html";
        }

    </script>
    <script src="js/main.js"></script>
</body>

</html>
