<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <style>
        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
    </style>
</head>

<body>

    <div class="card p-4 shadow" style="width:360px">

        <h3 class="text-center">Hotel Login</h3>

        <div id="msg"></div>

        <input id="email" class="form-control mb-3" placeholder="Email">

        <input id="password" type="password" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-primary w-100" onclick="login()">Login</button>

        <p class="text-center mt-3">
            No account? <a href="register.html">Register</a>
        </p>
       
    </div>

    <script>

        function login() {

            let users = JSON.parse(localStorage.getItem("users")) || [];

            let user = users.find(u => u.email == email.value && u.password == password.value);

            if (user) {

                localStorage.setItem("loginUser", email.value);

                location.href = "dashboard.html";

            } else {

                msg.innerHTML = '<div class="alert alert-danger">Invalid Login</div>';

            }

        }

    </script>

</body>

</html>
